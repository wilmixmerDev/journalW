services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      # Deja la caché de build fuera del bind mount compartido con Windows (ahí falla).
      - /app/.next
    environment:
      - TZ=America/Bogota
      # El navegador (corre en el host) y el servidor (corre en el contenedor) necesitan direcciones distintas.
      - NEXT_PUBLIC_SUPABASE_URL=http://127.0.0.1:54321
      - SUPABASE_INTERNAL_URL=http://host.docker.internal:54321
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - BREVO_API_KEY=${BREVO_API_KEY}
      - BREVO_FROM_EMAIL=${BREVO_FROM_EMAIL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
